<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korgoneere — Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  :root{
    --teal:#163832; --teal-2:#1F4A42; --gold:#C9A227; --gold-soft:#E4C766;
    --orange:#E2782B; --orange-dim:#C4611C; --ink:#1B1B1B; --muted:#6E6E6E;
    --line:#ECECEC; --paper:#FFFFFF; --bg:#FAFAF8;
    --red:#C1502E; --green:#2E7D4F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Manrope',sans-serif;}
  .wrap{max-width:1100px; margin:0 auto; padding:0 20px 60px;}
  header{background:var(--teal); padding:20px; margin-bottom:24px;}
  header .inner{max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  .logo{font-family:'Fraunces',serif; font-weight:600; font-size:20px; letter-spacing:0.1em; color:var(--gold-soft); text-transform:uppercase;}
  .updated{font-size:12px; color:rgba(255,255,255,0.65);}
  .refresh-btn{background:var(--orange); color:#fff; border:none; padding:8px 14px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer;}
  .refresh-btn:active{background:var(--orange-dim);}

  h1{font-family:'Fraunces',serif; font-size:22px; color:var(--teal); margin:20px 0 14px;}

  .kpi-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:28px;}
  .kpi{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px;}
  .kpi .label{font-size:11.5px; font-weight:800; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted);}
  .kpi .value{font-family:'Fraunces',serif; font-size:26px; font-weight:700; color:var(--teal); margin-top:6px;}
  .kpi .value.positive{color:var(--green);}
  .kpi .value.negative{color:var(--red);}

  .panels{display:grid; grid-template-columns:1fr; gap:20px;}
  .panel{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:20px;}
  .panel h2{font-family:'Fraunces',serif; font-size:16px; color:var(--ink); margin-bottom:14px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.03em; color:var(--muted); padding:6px 8px; border-bottom:2px solid var(--line);}
  td{padding:8px; border-bottom:1px solid var(--line);}
  .alerte-ok{color:var(--green); font-weight:700;}
  .alerte-faible{color:var(--orange-dim); font-weight:700;}
  .alerte-rupture{color:var(--red); font-weight:700;}

  .loading, .error{padding:40px; text-align:center; color:var(--muted);}
  .error{color:var(--red);}

  @media (min-width:800px){
    .kpi-grid{grid-template-columns:repeat(5,1fr);}
    .panels{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="logo">Korgoneere — Dashboard</div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="updated" id="updatedAt">Chargement…</span>
      <button class="refresh-btn" id="refreshBtn">Actualiser</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="loadingMsg" class="loading">Chargement des données…</div>
  <div id="errorMsg" class="error" style="display:none;"></div>

  <div id="dashboardContent" style="display:none;">
    <h1>Vue d'ensemble</h1>
    <div class="kpi-grid">
      <div class="kpi"><div class="label">CA aujourd'hui</div><div class="value" id="kpiCaJour">-</div></div>
      <div class="kpi"><div class="label">CA total</div><div class="value" id="kpiCaTotal">-</div></div>
      <div class="kpi"><div class="label">Commandes total</div><div class="value" id="kpiCmdTotal">-</div></div>
      <div class="kpi"><div class="label">En attente</div><div class="value" id="kpiEnAttente">-</div></div>
      <div class="kpi"><div class="label">Bénéfice net</div><div class="value" id="kpiBenefice">-</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <h2>Commandes par statut</h2>
        <canvas id="chartStatuts" height="220"></canvas>
      </div>

      <div class="panel">
        <h2>Stock par produit</h2>
        <table>
          <thead>
            <tr><th>Code</th><th>Nom</th><th>Restant</th><th>Alerte</th></tr>
          </thead>
          <tbody id="stockTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // TODO : coller ici la même URL Apps Script que dans script.js
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzX0jsji1q645OPoRLMMxlaEE2iwmQOnwhAw7uTWgiBDTuMA9PkvE3t0bAAdZbk24O_6Q/exec";

  let statutsChart = null;

  function fmt(n){ return Number(n || 0).toLocaleString('fr-FR').replace(/,/g, ' '); }

  function alerteClass(a){
    if (a === 'Rupture de stock') return 'alerte-rupture';
    if (a === 'Stock faible') return 'alerte-faible';
    return 'alerte-ok';
  }

  async function loadDashboard(){
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'none';

    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();

      if (data.status !== 'ok') {
        throw new Error(data.message || 'Réponse invalide du script.');
      }

      // KPI
      document.getElementById('kpiCaJour').textContent = fmt(data.ca.aujourdHui) + ' FCFA';
      document.getElementById('kpiCaTotal').textContent = fmt(data.ca.total) + ' FCFA';
      document.getElementById('kpiCmdTotal').textContent = data.commandes.total;
      document.getElementById('kpiEnAttente').textContent = data.commandes.enAttente;

      const beneficeEl = document.getElementById('kpiBenefice');
      beneficeEl.textContent = fmt(data.compta.beneficeNet) + ' FCFA';
      beneficeEl.className = 'value ' + (data.compta.beneficeNet >= 0 ? 'positive' : 'negative');

      document.getElementById('updatedAt').textContent = 'Mis à jour : ' + new Date(data.updatedAt).toLocaleString('fr-FR');

      // Graphique statuts
      const ctx = document.getElementById('chartStatuts').getContext('2d');
      const chartData = {
        labels: ['En attente', 'En cours', 'Livrées', 'Annulées'],
        datasets: [{
          data: [data.commandes.enAttente, data.commandes.enCoursLivraison, data.commandes.livrees, data.commandes.annulees],
          backgroundColor: ['#E2782B', '#C9A227', '#2E7D4F', '#C1502E']
        }]
      };
      if (statutsChart) {
        statutsChart.data = chartData;
        statutsChart.update();
      } else {
        statutsChart = new Chart(ctx, {
          type: 'bar',
          data: chartData,
          options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
          }
        });
      }

      // Tableau stock
      const tbody = document.getElementById('stockTableBody');
      tbody.innerHTML = '';
      (data.stocks || []).forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${s.code}</td><td>${s.nom}</td><td>${s.stockActuel}</td><td class="${alerteClass(s.alerte)}">${s.alerte}</td>`;
        tbody.appendChild(tr);
      });

      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';
    } catch (err) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = "Erreur de chargement : " + err.message;
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
  loadDashboard();
</script>
</body>
</html>
